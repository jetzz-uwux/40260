<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Gráfico SVG</h1>
    <svg width="200", height="200" viewbox=" 0 0 50 60">
        <circle r="40", cx="50", cy="50", fill="pink", stroke="magenta", stroke-width="4">
            <animate
            attributeName="cx"
            begin="0s"
            dur="10s"
            from="-50"
            to="200%"
            repeatCount="indefinite" />
        </circle>
    </svg>
    <h2>Ejemplo con img</h2>
    <img src="circulo.svg" alt="">
    <h2>menú hamburguesa</h2>
    <img src="icono.svg" alt="menú"> menú
</body>
</html>
